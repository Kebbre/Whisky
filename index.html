<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisky Collection</title>

       META  — update name / description as needed
  ───────────────────────────────────────────────────────────── -->
  <meta name="description"    content="A curated personal whisky collection — searchable by distillery, region, tasting profile and accessibility level." />
  <meta name="author"         content="Arthur Pescher" />
  <meta property="og:title"   content="Whisky Collection" />
  <meta property="og:description" content="Opened whiskies — searchable, filterable, bilingual EN/FR." />
  <meta property="og:type"    content="website" />

  <!-- Google Fonts — loads online; page degrades to system fonts offline -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" />

  <style>

    :root {
      --bg:       #e8e2d8;   /* taupe chaud */
      --surface:  #f0ebe2;   /* taupe clair */
      --card:     #faf8f5;   /* blanc cassé */
      --hdr:      #1a130c;   /* brun très sombre */
      --accent:   #8a6530;   /* or ambré */
      --accent2:  #b08840;   /* or plus clair */
      --gold:     #6a4e22;   /* or profond */
      --text:     #1e1810;   /* brun très foncé */
      --muted:    #7a6e60;   /* gris chaud */
      --border:   #d0c8bc;   /* bordure taupe */
      --shadow:   rgba(30,20,10,.10);
      --shadow2:  rgba(30,20,10,.18);
      /* badges */
      --g-bg:#eaf3ec; --g-fg:#2a6835; --g-brd:#a8d4ae;
      --i-bg:#fef5e4; --i-fg:#7a4e08; --i-brd:#e8c070;
      --a-bg:#fbe8e8; --a-fg:#7a1a1a; --a-brd:#e8a0a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      /* Jost loads from Google Fonts when online; falls back to clean system sans offline */
      font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-weight: 300;
      letter-spacing: .01em;
    }

    /* ── HEADER ── */
    header {
      background: var(--hdr);
      padding: 28px 40px;
      display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .h-wordmark { display: flex; align-items: baseline; gap: 14px; }
    .h-icon  { font-size: 22px; opacity: .85; }
    .h-title {
      font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: 28px; font-weight: 600; color: #e8d8b8;
      letter-spacing: 4px; text-transform: uppercase;
    }
    .h-divider { width: 1px; height: 22px; background: #4a3a28; margin: 0 6px; }
    .h-sub  {
      font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 300;
      color: #7a6a58; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px;
    }
    .lang-wrap { display: flex; gap: 4px; }
    .lang-btn {
      background: none; border: 1px solid #3a2e22; color: #6a5a48;
      padding: 5px 13px; cursor: pointer; font-size: 11px; font-weight: 500; letter-spacing: 1px;
      border-radius: 2px; transition: all .2s; font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif; text-transform: uppercase;
    }
    .lang-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .lang-btn.on { background: var(--accent2); border-color: var(--accent2); color: #1a130c; font-weight: 600; }

    /* ── CONTROLS ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px; display: flex; flex-direction: column; gap: 13px;
    }
    .ctrl-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .ctrl-lbl {
      font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1.8px; min-width: 68px; font-weight: 500;
    }
    .search-wrap { flex: 1; position: relative; min-width: 220px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }
    .search-in {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 9px 14px 9px 34px; font-size: 13px; border-radius: 3px;
      outline: none; transition: border-color .2s, box-shadow .2s;
      font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif; font-weight: 300;
    }
    .search-in:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(138,101,48,.12); }
    .search-in::placeholder { color: #b0a898; }
    .clear-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 15px; cursor: pointer; font-size: 11px; letter-spacing: .8px;
      border-radius: 2px; transition: all .2s; font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
      font-weight: 400; white-space: nowrap; text-transform: uppercase;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* chips */
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 5px 14px; border-radius: 2px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: 11px;
      font-weight: 400; letter-spacing: .5px; transition: all .15s; user-select: none;
      white-space: nowrap; font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(138,101,48,.05); }
    .chip.on               { background: var(--accent);  border-color: var(--accent);  color: #faf8f5; font-weight: 500; }
    .chip.on.c-beg         { background: var(--g-fg);    border-color: var(--g-fg);    color: #fff; }
    .chip.on.c-int         { background: #9a6a10;        border-color: #9a6a10;        color: #fff; }
    .chip.on.c-adv         { background: #8a2020;        border-color: #8a2020;        color: #fff; }

    /* ── RESULTS BAR ── */
    .results-bar {
      padding: 9px 40px; font-size: 11px; color: var(--muted); letter-spacing: .5px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .results-bar strong { color: var(--accent); font-weight: 600; }

    /* ── GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; padding: 28px 40px; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 2px 8px var(--shadow);
      transition: box-shadow .25s, transform .2s, border-color .2s;
    }
    .card:hover {
      box-shadow: 0 6px 24px var(--shadow2);
      transform: translateY(-3px);
      border-color: var(--accent2);
    }

    /* card top band */
    .card-top {
      padding: 12px 18px 10px;
      border-bottom: 1px solid #eae4da;
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      background: var(--surface);
    }
    .c-origin { display: flex; align-items: center; gap: 8px; }
    .c-flag   { font-size: 17px; line-height: 1; }
    .c-country{
      font-size: 9px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1.5px; font-weight: 500;
    }
    .c-sep    { color: var(--border); font-size: 10px; }
    .c-region { font-size: 9px; color: var(--muted); font-style: italic; }

    .badge {
      padding: 3px 10px; border-radius: 2px; font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; border: 1px solid;
      font-family: 'Jost', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
    }
    .b-beg { background: var(--g-bg); color: var(--g-fg); border-color: var(--g-brd); }
    .b-int { background: var(--i-bg); color: var(--i-fg); border-color: var(--i-brd); }
    .b-adv { background: var(--a-bg); color: var(--a-fg); border-color: var(--a-brd); }

    /* card body */
    .card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 11px; }

    .c-distillery {
      font-size: 9px; color: var(--accent); text-transform: uppercase;
      letter-spacing: 2px; font-weight: 500;
    }
    .c-name {
      font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: 19px; font-weight: 600; line-height: 1.25; color: var(--text);
    }
    .c-special {
      font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.5; font-weight: 300;
    }

    /* specs row */
    .specs {
      display: flex; gap: 0; border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
    }
    .spec-item {
      flex: 1; padding: 7px 10px; display: flex; flex-direction: column; gap: 2px;
      border-right: 1px solid var(--border); background: var(--surface);
    }
    .spec-item:last-child { border-right: none; }
    .spec-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500; }
    .spec-val { font-size: 14px; color: var(--gold); font-weight: 600; font-family: 'Cormorant Garamond', serif; }
    .spec-val small { font-size: 10px; font-weight: 400; color: var(--muted); }
    .spec-est { font-size: 8px; color: #b08840; font-style: italic; }
    .spec-type { font-size: 10px; color: var(--muted); font-style: italic; font-weight: 300; line-height: 1.3; }

    /* tasting notes */
    .tasting {
      font-size: 12.5px; color: #3a3028; line-height: 1.7; font-weight: 300;
      padding: 10px 13px; background: #f4f0e8; border-radius: 3px;
      border-left: 2px solid var(--accent2); flex: 1;
      font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif; font-style: italic;
    }
    .tasting.est-notes { border-left-color: #c8a060; background: #faf6ee; }

    /* tags */
    .c-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .c-tag {
      padding: 2px 9px; background: #ede8de; color: var(--accent);
      border-radius: 2px; font-size: 10px; border: 1px solid #d8d0c4;
      font-weight: 400; letter-spacing: .3px;
    }

    /* notice */
    .c-notice { font-size: 10px; color: #a08040; font-style: italic; font-weight: 300; }

    /* ── DIVIDER LINE in card ── */
    .card-divider { height: 1px; background: #eae4da; margin: 0 18px; }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1; text-align: center; padding: 72px 20px;
      color: var(--muted); font-size: 15px; font-style: italic;
      font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    }

    /* ── LEGEND ── */
    .legend {
      padding: 12px 40px 24px; display: flex; gap: 24px; flex-wrap: wrap;
      font-size: 10px; color: var(--muted); letter-spacing: .5px;
      border-top: 1px solid var(--border);
    }
    .legend-item { display: flex; gap: 7px; align-items: center; }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8a060; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header, .controls, .results-bar, .grid, .legend { padding-left: 16px; padding-right: 16px; }
      .h-title { font-size: 20px; letter-spacing: 2px; }
      .grid { grid-template-columns: 1fr; gap: 14px; }
    }
  </style>
</head>

/* FILTER STATE */
let lang    = 'en';
let search  = '';
let fAcc    = 'all';
let fAbv    = 'all';
let fCty    = 'all';
let fTaste  = new Set();

/* FILTERABLE TASTE TAGS (shown as chips) */
const TASTE_CHIPS = ["peated","sherried","fruity","sweet","spicy","maritime","floral","vanilla","wine-cask","cask-strength"];

function t(key) { return I18N[lang][key]; }

/* ── RENDER CONTROLS ── */
function renderControls() {
  const L = I18N[lang];
  document.getElementById('h-title').textContent = L.title;
  document.getElementById('h-sub').textContent   = L.sub;
  document.getElementById('search-in').placeholder = L.search;
  document.getElementById('btn-clear').textContent  = L.clear;
  document.getElementById('lbl-level').textContent   = L.level;
  document.getElementById('lbl-abv').textContent     = L.abv;
  document.getElementById('lbl-country').textContent = L.country;
  document.getElementById('lbl-taste').textContent   = L.taste;

  /* accessibility chips */
  document.getElementById('acc-chips').innerHTML = [
    { v:'all', lbl: L.all,  cls:'' },
    { v:'beginner',    lbl: L.beg, cls:'c-beg' },
    { v:'intermediate',lbl: L.int, cls:'c-int' },
    { v:'advanced',    lbl: L.adv, cls:'c-adv' },
  ].map(c => `<div class="chip ${c.cls}${fAcc===c.v?' on':''}"
    onclick="setAcc('${c.v}')">${c.lbl}</div>`).join('');

  /* abv chips */
  const abvOpts = [
    { v:'all', lbl: L.all },
    { v:'under43', lbl:'< 43%' },
    { v:'43to50',  lbl:'43–50%' },
    { v:'50to60',  lbl:'50–60%' },
    { v:'over60',  lbl:'60%+' },
  ];
  document.getElementById('abv-chips').innerHTML = abvOpts.map(c =>
    `<div class="chip${fAbv===c.v?' on':''}" onclick="setAbv('${c.v}')">${c.lbl}</div>`
  ).join('');

  /* country chips */
  const ctyOpts = ['all','Scotland','Japan','Ireland','USA','France'];
  document.getElementById('cty-chips').innerHTML = ctyOpts.map(c =>
    `<div class="chip${fCty===c?' on':''}" onclick="setCty('${c}')">${
      c==='all' ? L.cty.all : (FLAGS[c]||'') + ' ' + (L.cty[c]||c)
    }</div>`
  ).join('');

  /* taste chips */
  document.getElementById('taste-chips').innerHTML = TASTE_CHIPS.map(tag =>
    `<div class="chip${fTaste.has(tag)?' on':''}" onclick="toggleTaste('${tag}')">${L.tags[tag]||tag}</div>`
  ).join('');

  /* legend */
  document.getElementById('legend').innerHTML =
    `<div class="legend-item"><div class="leg-orange"></div>${L.legEst}</div>
     <div class="legend-item"><div class="leg-orange"></div>${L.legEstT}</div>`;
}

/* ── FILTER SETTERS ── */
function setAcc(v){ fAcc=v; run(); }
function setAbv(v){ fAbv=v; run(); }
function setCty(v){ fCty=v; run(); }
function toggleTaste(tag){ fTaste.has(tag)?fTaste.delete(tag):fTaste.add(tag); run(); }
function clearAll(){
  search=''; fAcc='all'; fAbv='all'; fCty='all'; fTaste=new Set();
  document.getElementById('search-in').value='';
  run();
}

/* ── FILTER LOGIC ── */
function abvMatch(w){
  const a = w.abv;
  if(fAbv==='all')      return true;
  if(fAbv==='under43')  return a < 43;
  if(fAbv==='43to50')   return a >= 43 && a <= 50;
  if(fAbv==='50to60')   return a > 50  && a <= 60;
  if(fAbv==='over60')   return a > 60;
  return true;
}
function filter(list){
  const q = search.trim().toLowerCase();
  return list.filter(w => {
    if(fAcc!=='all' && w.accessibility!==fAcc) return false;
    if(!abvMatch(w)) return false;
    if(fCty!=='all' && w.country!==fCty) return false;
    if(fTaste.size>0 && ![...fTaste].some(t=>w.tags.includes(t))) return false;
    if(q){
      const hay = [w.distillery,w.name,w.special,w.tasting.en,w.tasting.fr,w.country,w.region,w.type,...w.tags].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ── CARD HTML ── */
function cardHTML(w){
  const L = I18N[lang];
  const badgeCls = w.accessibility==='beginner'?'b-beg':w.accessibility==='advanced'?'b-adv':'b-int';
  const accLbl   = L.acc[w.accessibility] || w.accessibility;
  const ageVal   = w.age ? `${w.age} <small>${L.yrs}</small>` : `<span style="font-size:11px;color:var(--muted);font-weight:400">${L.nas}</span>`;
  const abvVal   = `${w.abvInferred?'~':''}${w.abv}%`;
  const flag     = FLAGS[w.country] || '🌍';
  const notices  = [];
  if(w.abvInferred)      notices.push(`~ ${L.estAbv}`);
  if(w.tastingInferred)  notices.push(`* ${L.estTasting}`);

  return `
  <div class="card">
    <div class="card-top">
      <div class="c-origin">
        <span class="c-flag">${flag}</span>
        <span class="c-country">${L.cty[w.country]||w.country}</span>
        ${w.region ? `<span class="c-sep">·</span><span class="c-region">${esc(w.region)}</span>` : ''}
      </div>
      <div class="badge ${badgeCls}">${accLbl}</div>
    </div>
    <div class="card-body">
      <div>
        <div class="c-distillery">${esc(w.distillery)}</div>
        <div class="c-name">${esc(w.name)}</div>
        ${w.special ? `<div class="c-special">${esc(w.special)}</div>` : ''}
      </div>
      <div class="specs">
        <div class="spec-item">
          <span class="spec-lbl">${L.age}</span>
          <span class="spec-val">${ageVal}</span>
        </div>
        <div class="spec-item">
          <span class="spec-lbl">${L.abvLbl}</span>
          <span class="spec-val">${abvVal}</span>
          ${w.abvInferred?`<span class="spec-est">${L.estAbv}</span>`:''}
        </div>
        <div class="spec-item" style="flex:2">
          <span class="spec-lbl">${L.type}</span>
          <span class="spec-type">${esc(w.type)}</span>
        </div>
      </div>
      <div class="tasting${w.tastingInferred?' est-notes':''}">${esc(w.tasting[lang])}</div>
      <div class="c-tags">
        ${w.tags.map(tag=>`<span class="c-tag">${L.tags[tag]||tag}</span>`).join('')}
      </div>
      ${notices.length ? `<div class="c-notice">${notices.join(' · ')}</div>` : ''}
    </div>
  </div>`;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ── MAIN RENDER ── */
function run(){
  renderControls();
  const visible = filter(WHISKIES);
  const L = I18N[lang];
  document.getElementById('results-bar').innerHTML = `<strong>${visible.length}</strong> ${L.found(visible.length).replace(/^\d+ /,'')}`;
  document.getElementById('grid').innerHTML = visible.length
    ? visible.map(cardHTML).join('')
    : `<div class="empty">${L.noResults}</div>`;
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on', b.textContent===l.toUpperCase()));
  run();
}

/* ── INIT ── */
run();
</script>
